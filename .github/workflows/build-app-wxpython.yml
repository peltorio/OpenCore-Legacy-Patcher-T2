name: CI - Build wxPython

on:
  push:
    branches:
      - main
      - macos-15-intel
    tags:
      - '*'
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: Build wxPython
    runs-on: macos-15-intel
    timeout-minutes: 120
    permissions:
      contents: write

    env:
      branch: ${{ github.ref }}
      commiturl: ${{ github.event.head_commit.url }}${{ github.event.release.html_url }}
      commitdate: ${{ github.event.head_commit.timestamp }}${{ github.event.release.published_at }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Universal Python 3.14
        run: |
          curl -fsSL -o python-installer.pkg https://www.python.org/ftp/python/3.14.0/python-3.14.0-macos11.pkg
          sudo installer -pkg python-installer.pkg -target /
          echo "/Library/Frameworks/Python.framework/Versions/3.14/bin" >> $GITHUB_PATH

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: /Library/Frameworks/Python.framework/Versions/3.14/bin/python3 -m pip install -r requirements.txt

      - name: Force Universal2 charset for Python
        run: |
          /Library/Frameworks/Python.framework/Versions/3.14/bin/python3 -m pip uninstall -y charset_normalizer || true
          /Library/Frameworks/Python.framework/Versions/3.14/bin/python3 -m pip download --platform macosx_10_9_universal2 --only-binary=:all: --dest ./charset_tmp charset-normalizer
          /Library/Frameworks/Python.framework/Versions/3.14/bin/python3 -m pip install ./charset_tmp/charset_normalizer-*.whl
          rm -rf ./charset_tmp

      - name: Recompile Privileged Helper (debug, no team ID check)
        run: make -C ci_tooling/privileged_helper_tool debug

      - name: Prepare Assets (--prepare-assets)
        run: >
          /Library/Frameworks/Python.framework/Versions/3.14/bin/python3 Build-Project.command
          --run-as-individual-steps --reset-dmg-cache
          --prepare-assets

      - name: Prepare Application (--prepare-application)
        run: >
          /Library/Frameworks/Python.framework/Versions/3.14/bin/python3 Build-Project.command
          --git-branch "${{ env.branch }}"
          --git-commit-url "${{ env.commiturl }}"
          --git-commit-date "${{ env.commitdate }}"
          --reset-pyinstaller-cache
          --run-as-individual-steps
          --prepare-application

      - name: Prepare Package (--prepare-package)
        run: >
          /Library/Frameworks/Python.framework/Versions/3.14/bin/python3 Build-Project.command
          --run-as-individual-steps
          --prepare-package

      - name: Upload AutoPkg Package to Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AutoPkg-Assets.pkg
          path: ./dist/AutoPkg-Assets.pkg

      - name: Upload Installation Package to Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: OpenCore-Patcher.pkg
          path: ./dist/OpenCore-Patcher.pkg

      - name: Upload Uninstaller Package to Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: OpenCore-Patcher-Uninstaller.pkg
          path: ./dist/OpenCore-Patcher-Uninstaller.pkg

      - name: Compute preview release name from upstream tags
        if: github.event_name == 'push'
        run: |
          LATEST_ORIGIN_TAG=$(git ls-remote --tags https://github.com/albert-mueller/OpenCore-Legacy-Patcher-T2.git \
            | awk '{print $2}' \
            | sed 's#refs/tags/##' \
            | sed 's/\^{}$//' \
            | grep -E '[0-9]{2}$' \
            | sort -V \
            | tail -n1)
          LATEST_SUFFIX=$(printf '%s' "$LATEST_ORIGIN_TAG" | grep -Eo '[0-9]{2}$' || echo '00')
          NEXT_SUFFIX=$((10#$LATEST_SUFFIX + 1))
          DATE_ISO=$(date -u +%Y%m%d)
          RELEASE_NAME="4.0.0 alpha ${NEXT_SUFFIX}-${DATE_ISO}"
          RELEASE_TAG=$(printf '%s' "$RELEASE_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
          echo "release_name=$RELEASE_NAME" >> $GITHUB_ENV
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_ENV

      - name: Create Release
        if: github.event_name == 'push' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'push' && env.release_tag || github.ref_name }}
          name: ${{ github.event_name == 'push' && env.release_name || github.ref_name }}
          prerelease: ${{ github.event_name == 'push' }}
          files: |
            ./dist/AutoPkg-Assets.pkg
            ./dist/OpenCore-Patcher.pkg
            ./dist/OpenCore-Patcher-Uninstaller.pkg
          generate_release_notes: false
          body: |
            ## OpenCore Legacy Patcher ${{ github.event_name == 'push' && env.release_name || github.ref_name }}

            ### Changes
            - Added T2 Mac support
            - Fixes USB boot entry not appearing in T2 Mac Startup Manager (adds EFI/BOOT/BOOTx64.efi)
